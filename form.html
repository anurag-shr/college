<!DOCTYPE html>
<html>
<head>
    <title>Survey Form</title>
</head>

<body>

    <h1>Survey Form</h1>

    <p>Please fill out the following survey form.</p>

    <hr>

    <form>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        <br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
        <br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" placeholder="Enter your age">
        <br><br>

        <label for="course">Select Your Course:</label><br>
        <select id="course" name="course">
            <option value="">-- Select Course --</option>
            <option value="bsc">B.Sc</option>
            <option value="msc">M.Sc</option>
            <option value="btech">B.Tech</option>
            <option value="mtech">M.Tech</option>
        </select>
        <br><br>

        <label>Gender:</label><br>

        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <br>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>

        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
        <br><br>

        <label>Which topics are you interested in?</label><br>

        <input type="checkbox" id="html" name="interest" value="html">
        <label for="html">HTML</label>
        <br>

        <input type="checkbox" id="css" name="interest" value="css">
        <label for="css">CSS</label>
        <br>

        <input type="checkbox" id="javascript" name="interest" value="javascript">
        <label for="javascript">JavaScript</label>
        <br><br>

        <label for="rating">Rate this survey:</label><br>
        <select id="rating" name="rating">
            <option value="">-- Select Rating --</option>
            <option value="excellent">Excellent</option>
            <option value="good">Good</option>
            <option value="average">Average</option>
            <option value="poor">Poor</option>
        </select>
        <br><br>

        <label for="feedback">Your Feedback:</label><br>
        <textarea id="feedback" name="feedback" rows="5" cols="40" placeholder="Write your feedback here"></textarea>
        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
